name: Deploy Env Secrets
on:
  push:
    branches:
      - main
      - dev
      # [AGGIUNTO]: Il workflow parte solo se modifichi file in questa cartella
    paths:
      - 'env-variables-secrets/**'

  workflow_dispatch: # Permette l'avvio manuale da GitHub
env:
  MONGODB_DB_NAME: gha-demo
jobs:
  test:
    environment: testing
    env:
      MONGODB_CLUSTER_ADDRESS: cluster0.sizxk9i.mongodb.net
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
      PORT: 8080
    runs-on: ubuntu-latest
    # [AGGIUNTO]: Imposta la cartella di lavoro per tutti i comandi 'run' di questo job
    defaults:
        run:
          working-directory: ./env-variables-secrets
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          # [MODIFICATO]: Punta al lock file nella sottocartella per la chiave della cache
          key: npm-deps-${{ hashFiles('env-variables-secrets/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        # [NOTA]: Assicurati che la porta XYZ sia quella corretta del tuo progetto (es. 3000)
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: |
            echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    # [AGGIUNTO]: Anche il job di deploy deve puntare alla sottocartella
    defaults:
        run:
          working-directory: ./env-variables-secrets

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Output information
        run: |      
          echo "MONGODB_DB_NAME: ${{ env.MONGODB_DB_NAME}}"
