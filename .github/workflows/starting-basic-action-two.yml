name: Events Demo - Starting Project two
on:
  pull_request:
    types:
      - opened
    branches:
      - main
    # [AGGIUNTO]: Si attiva solo se la PR tocca file in questa cartella
    paths:
      - 'starting-basic-action/**'
  
  workflow_dispatch: # Permette l'avvio manuale da GitHub

  push:
    branches:
      - main
      - 'feat/**'
    # [AGGIUNTO]: Si attiva solo se il push tocca file in questa cartella
    paths:
      - 'starting-basic-action/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # [AGGIUNTO]: Indica a GitHub di eseguire i comandi dentro la sottocartella
    defaults:
      run:
        working-directory: ./starting-basic-action
    steps:
      - name: Get code
        uses: actions/checkout@v4 # Deve essere primo per permettere al working-directory di funzionare

      - name: Output event data
        run: echo "Event triggered"


      - name: Cache dependencies
        uses: actions/cache@v4 # Aggiornato a v4
        with:
          path: ~/.npm
          # [MODIFICATO]: Punta al package-lock.json specifico della cartella
          key: ${{ runner.os }}-node-${{ hashFiles('starting-basic-action/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Test code
        run: npm run test

      - name: Build code
        run: npm run build

      - name: Deploy project
        run: echo "Deploying..."
