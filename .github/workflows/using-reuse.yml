# Nome del workflow che apparirà nell'interfaccia di GitHub
name: Using Reusable Workflow

# Definisce l'evento che scatena il workflow
on:
  pull_request:
    types:
       [opened, synchronize] # Ora riparte a ogni push sulla PR
    branches:
      - main
      - dev
    paths:
      - 'starting-basic-action/**'
      - '.github/workflows/using-reuse.yml'
  push:
    branches:
      - main
      - dev
   # [AGGIUNTO]: Importante per non far girare questo workflow
    # quando lavori su 'env-variables-secrets'.
    paths:
      - 'starting-basic-action/**'
      - '.github/workflows/using-reuse.yml'
  workflow_dispatch: # Permette l'avvio manuale da GitHub

jobs:
  # --- PRIMO JOB: TEST ---
  test:
    runs-on: ubuntu-latest
    # [AGGIUNTO]: Imposta la cartella di lavoro per tutti i comandi 'run'
    defaults:
      run:
        working-directory: ./starting-basic-action
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4 # Aggiornato a v4
        with:
          path: ~/.npm
          # hashFiles() usa il percorso dal repository root
          key: ${{ runner.os }}-deps-node-modules-${{ hashFiles('starting-basic-action/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Test code
        run: npm run test

  # --- SECONDO JOB: BUILD ---
  build:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./starting-basic-action
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-deps-node-modules-${{ hashFiles('starting-basic-action/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Publish JS filename
        id: publish
        run: |
          # [NOTA]: Eseguito dentro starting-basic-action grazie al default sopra
          FILE=$(find dist/assets/*.js -type f -exec basename {} \; | head -n 1)
          echo "script-file=$FILE" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          # Percorso completo dal repository root (non usa working-directory)
          path: starting-basic-action/dist
          retention-days: 1
  # --- TERZO JOB: DEPLOY ---
  deploy:
    needs: build
    uses: ./.github/workflows/reusable.yml
    with:
      artifact-name: dist-files
    # secrets:
      #some-secret : ${{ secrets.some-secret }}

